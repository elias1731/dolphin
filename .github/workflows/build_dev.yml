name: "🛠️• Build Dolphin UWP [DEV] 🐬"

on:
  workflow_dispatch:
    inputs:
      cleanup:
        description: 'Cleanup previous workflow runs'
        required: false
        type: boolean
        default: false
  pull_request:
    branches:
      - master
  # push:
  #   branches:
  #     - master

jobs:
  cleanup:
    runs-on: ubuntu-latest
    if: ${{ inputs.cleanup }}
    permissions:
      actions: write
    steps:
      - uses: actions/checkout@v4
      - uses: Bitte-ein-Git/action_clear-runs@main
          
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        configuration: ['Release']

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Set up MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Set up NuGet
      uses: NuGet/setup-nuget@v2

    - name: Extract version string from AppxManifest
      id: extract_version
      run: |
        $manifest = [xml](Get-Content Source\DolphinWinRT\Package.appxmanifest)
        $version = $manifest.Package.Identity.Version
        echo $version
        echo version=$version >> $env:GITHUB_OUTPUT

    - name: Setup dependencies (via vcpkg)
      run: |
        vcpkg integrate install
        vcpkg install sdl2 sdl2-image sdl2-mixer sdl2-ttf --triplet x64-windows

    # - name: Initialize Build Environment
    #   shell: cmd
    #   run: |
    #     call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"

    - name: Echo the GitHub Env for File Names
      run: |
        echo "${{ steps.extract_version.outputs.version }}"

    - name: Restore NuGet packages
      run: nuget restore Source/dolphin-emu.sln

    - name: Build the project
      # run: msbuild Source/dolphin-emu.sln /m /p:PlatformToolset=v143 /t:Restore,Rebuild /p:Configuration="${{ matrix.configuration }}" /p:Platform=x64 /t:restore,build /p:RestorePackagesConfig=true
      run: msbuild Source/dolphin-emu.sln /m /p:Configuration=Release /p:Platform=x64 /p:PlatformToolset=v143 /t:DolphinWinRT
      env:
        LINK: "/DEFAULTLIB:RuntimeObject.lib"

    - name: Upload APPX file
      if: matrix.configuration == 'Release'
      uses: actions/upload-artifact@v4
      with:
        name: appx-${{ matrix.configuration }}
        path: AppPackages