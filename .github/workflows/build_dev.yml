name: "🛠️• Build Dolphin UWP [DEV] 🐬"

on:
  workflow_dispatch:
    inputs:
      full:
        description: 'Build full project'
        required: false
        type: boolean
        default: false
      cleanup:
        description: 'Cleanup previous workflow runs'
        required: false
        type: boolean
        default: false
      cache:
        description: 'Enable build cache'
        required: true
        type: boolean
        default: true

  pull_request:
    branches:
      - master
  # push:
  #   branches:
  #     - master

jobs:
  cleanup:
    runs-on: ubuntu-latest
    if: ${{ inputs.cleanup }}
    permissions:
      actions: write
    steps:
      - uses: actions/checkout@v4
      - uses: Bitte-ein-Git/action_clear-runs@main
          
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        configuration: ['Release']

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Cache NuGet packages
      if: ${{ inputs.cache }}
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Cache build artifacts
      if: ${{ inputs.cache }}
      uses: actions/cache@v4
      with:
        path: |
          Build/
          Source/Externals/
        key: ${{ runner.os }}-build-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-build-

    - name: Set up MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Set up NuGet
      uses: NuGet/setup-nuget@v2

    - name: Extract version string from AppxManifest
      id: extract_version
      run: |
        $manifest = [xml](Get-Content Source\DolphinWinRT\Package.appxmanifest)
        $version = $manifest.Package.Identity.Version
        echo $version
        echo version=$version >> $env:GITHUB_OUTPUT

    - name: Echo the GitHub Env for File Names
      run: |
        echo "${{ steps.extract_version.outputs.version }}"

    - name: Restore NuGet packages
      run: nuget restore Source/dolphin-emu.sln

    - name: Build (DolphinWinRT-only)
      if: ${{ !inputs.full }}
      run: msbuild Source/dolphin-emu.sln /m:4 /p:Configuration=Release /p:Platform=x64 /p:PlatformToolset=v143 /p:PreferredToolArchitecture=x64 /t:DolphinWinRT
      env:
        LINK: "/DEFAULTLIB:RuntimeObject.lib"

    - name: Build (Full)
      if: ${{ inputs.full }}
      run: msbuild Source/dolphin-emu.sln /m:4 /p:PlatformToolset=v143 /t:Restore,Rebuild /p:Configuration="${{ matrix.configuration }}" /p:Platform=x64 /p:RestorePackagesConfig=true /p:PreferredToolArchitecture=x64 /p:WINRT_PLATFORM=true
      env:
        LINK: "/DEFAULTLIB:RuntimeObject.lib /NODEFAULTLIB:ole32.lib"
  
    - name: Upload compiled app package
      if: matrix.configuration == 'Release'
      uses: actions/upload-artifact@v4
      with:
        name: Dolphin-${{ steps.extract_version.outputs.version }}
        path: Source/AppPackages